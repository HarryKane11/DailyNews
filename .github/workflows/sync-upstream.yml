name: Sync with Upstream
on:
  schedule:
    # 매시간 실행 (UTC 기준)
    - cron: '0 * * * *'
  workflow_dispatch: # 수동 실행 가능
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/GENEXIS-AI/DailyNews.git || true
          git fetch upstream
      - name: Sync with upstream
        run: |
          git merge upstream/main --allow-unrelated-histories -m "Sync with upstream" || echo "Already up to date"
      - name: Push changes
        run: |
          git push origin main

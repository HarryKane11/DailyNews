name: Daily Newsletter Check
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: GENEXIS-AI/DailyNews
          ref: main
      - name: Check today's newsletter
        id: check
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "오늘 날짜: $TODAY"
          # 오늘 날짜로 시작하는 첫 번째 파일 찾기
          FOUND_FILE=$(find 뉴스레터 -name "${TODAY}*.md" -type f | head -1)
          if [ -n "$FOUND_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "file=$FOUND_FILE" >> $GITHUB_OUTPUT
            filename=$(basename "$FOUND_FILE")
            echo "filename=$filename" >> $GITHUB_OUTPUT
            echo "✅ 파일 발견: $FOUND_FILE"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "❌ 오늘자 뉴스레터를 찾을 수 없습니다."
          fi
      - name: Send to Slack
        if: steps.check.outputs.found == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FILENAME: ${{ steps.check.outputs.filename }}
          FILEPATH: ${{ steps.check.outputs.file }}
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          CONTENT=$(head -c 1000 "$FILEPATH")
          CONTENT_ESCAPED=$(echo "$CONTENT" | jq -Rs . | sed 's/^"//;s/"$//')
          FILE_URL="https://github.com/GENEXIS-AI/DailyNews/blob/main/$FILEPATH"
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"📰 ${TODAY} 뉴스레터\",
                    \"emoji\": true
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*파일명:* \`${FILENAME}\`\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*미리보기:*\n\`\`\`${CONTENT_ESCAPED}\`\`\`\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"<${FILE_URL}>\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"오늘의 뉴스레터 • $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S KST')\"
                    }
                  ]
                }
              ]
            }"
      - name: No newsletter found
        if: steps.check.outputs.found == 'false'
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "오늘(${TODAY}) 뉴스레터를 찾을 수 없습니다."

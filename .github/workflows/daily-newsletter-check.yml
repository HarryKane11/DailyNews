name: Daily Newsletter Check
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: GENEXIS-AI/DailyNews
          ref: main
      - name: Check today's newsletter
        id: check
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "오늘 날짜: $TODAY"
          FOUND_FILE=$(find 뉴스레터 -name "${TODAY}*.md" -type f | head -1)
          if [ -n "$FOUND_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "file=$FOUND_FILE" >> $GITHUB_OUTPUT
            filename=$(basename "$FOUND_FILE")
            echo "filename=$filename" >> $GITHUB_OUTPUT
            echo "✅ 파일 발견: $FOUND_FILE"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "❌ 오늘자 뉴스레터를 찾을 수 없습니다."
          fi
      - name: Send to Slack
        if: steps.check.outputs.found == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FILENAME: ${{ steps.check.outputs.filename }}
          FILEPATH: ${{ steps.check.outputs.file }}
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          FILE_URL="https://github.com/GENEXIS-AI/DailyNews/blob/main/$FILEPATH"
          # 첫 번째 뉴스 항목 추출 (이미지 제외)
          FIRST_NEWS=$(awk '/^## 제목:/{flag=1} flag{print} /^---$/{if(flag) exit}' "$FILEPATH" | grep -v "^!\[Image\]")
          # 제목 추출
          TITLE=$(echo "$FIRST_NEWS" | grep "^## 제목:" | sed 's/## 제목: //')
          # 요약 추출
          SUMMARY=$(echo "$FIRST_NEWS" | grep "^\*\*요약\*\*:" | sed 's/\*\*요약\*\*: //')
          # 쉬운설명 추출
          EASY=$(echo "$FIRST_NEWS" | grep "^\*\*쉬운설명\*\*:" | sed 's/\*\*쉬운설명\*\*: //')
          # 관련분야 추출
          FIELD=$(echo "$FIRST_NEWS" | grep "^\*\*관련분야\*\*:" | sed 's/\*\*관련분야\*\*: //')
          # 중요도 추출
          IMPORTANCE=$(echo "$FIRST_NEWS" | grep "^\*\*중요도\*\*:" | sed 's/\*\*중요도\*\*: //')
          # 전체링크 추출
          LINK=$(echo "$FIRST_NEWS" | grep "^\*\*전체링크\*\*" | sed 's/\*\*전체링크\*\* : //' | tr -d '')
          # JSON 이스케이프
          TITLE_ESC=$(echo "$TITLE" |q -Rs .)
          SUMMARY_ESC=$(echo "$SUMMARY" | jq -Rs .)
          EASY_ESC=$(echo "$EASY" | jq -Rs .)
          FIELD_ESC=$(echo "$FIELD" | jq -Rs .)
          # Slack 메시지 전송
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"📰 ${TODAY} AI 뉴스레터\",
                    \"emoji\": true
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*${TITLE}*\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*📌 요약*\n${SUMMARY_ESC//\"/}\"
                    }
                  ]
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*💡 쉬운설명*\n${EASY_ESC//\"/}\"
                    }
                  ]
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*🏷️ 분야*\n${FIELD_ESC//\"/}\"
                    },
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*⭐ 중요도*\n${IMPORTANCE}\"
                    }
                  ]
                },
                {
                  \"type\": \"divider\"
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {
                      \"type\": \"button\",
                      \"text\": {
                        \"type\": \"plain_text\",
                        \"text\": \"🔗 원문 보기\",
                        \"emoji\": true
                      },
                      \"url\": \"${LINK}\",
                      \"style\": \"primary\"
                    },
                    {
                      \"type\": \"button\",
                        \"type\": \"plain_text\",
                        \"text\": \"📄 전체 뉴스레터\",
                        \"emoji\": true
                      },
                      \"url\": \"${FILE_URL}\"
                    }
                  ]
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"🕐 $(TZ=Asia/Seoul date +'%Y년 %m월 %d일 %H:%M') KST\"
                    }
                  ]
                }
              ]
            }"
      - name: No newsletter found
        if: steps.check.outputs.found == 'false'
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "오늘(${TODAY}) 뉴스레터를 찾을 수 없습니다."
